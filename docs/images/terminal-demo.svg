<svg viewBox="0 0 960 780" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','Fira Code','Cascadia Code',Menlo,Monaco,monospace" font-size="13">
  <defs>
    <linearGradient id="titlebar-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <clipPath id="terminal-clip">
      <rect x="0" y="0" width="960" height="780" rx="10"/>
    </clipPath>
  </defs>

  <!-- Window frame -->
  <rect width="960" height="780" rx="10" fill="#1e1e1e"/>

  <!-- Title bar -->
  <rect width="960" height="32" rx="10" fill="url(#titlebar-bg)"/>
  <rect x="0" y="22" width="960" height="10" fill="url(#titlebar-bg)"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="480" y="20" text-anchor="middle" fill="#c5c8c6" font-size="13" font-weight="bold">promptvault</text>

  <g clip-path="url(#terminal-clip)">
  <!-- Terminal content area -->
  <g transform="translate(16, 44)" fill="#c5c8c6" font-size="13">

    <!-- Shell prompt -->
    <text y="14"><tspan fill="#6b8e9e">~/projects/</tspan><tspan fill="#68a0b3" font-weight="bold">myapp</tspan><tspan fill="#6b8e9e"> main</tspan><tspan fill="#868887"> &gt; </tspan><tspan fill="#98a84b">pv</tspan></text>
    <text y="32" fill="#868887">Syncing... done.</text>

    <!-- Top pane border -->
    <rect x="4" y="46" width="920" height="232" rx="2" fill="none" stroke="#444" stroke-width="1"/>

    <!-- FZF header area -->
    <g transform="translate(14, 58)">
      <!-- Search line -->
      <text y="14"><tspan fill="#68a0b3">conv&gt; </tspan><tspan fill="#c5c8c6">docker networking</tspan></text>
      <text y="32" fill="#868887">  8/156 (0)</text>
      <text y="50" fill="#6b8e9e" font-style="italic">  156 conversations</text>

      <!-- Selected row (highlighted) -->
      <rect x="-6" y="56" width="904" height="18" fill="#2a5a8a" rx="1"/>
      <text y="70" font-weight="bold">
        <tspan fill="#c5c8c6">  03-25 14:30</tspan>
        <tspan fill="#c5c8c6" dx="8">8p</tspan>
        <tspan fill="#98a84b" dx="8">my-webapp</tspan>
        <tspan fill="#ffffff" dx="32" font-weight="bold">Set up docker networking for</tspan>
      </text>

      <!-- Conversation rows -->
      <text y="88">
        <tspan fill="#868887">      03-25 10:15</tspan>
        <tspan fill="#868887" dx="8">3p</tspan>
        <tspan fill="#98a84b" dx="8">my-webapp</tspan>
        <tspan fill="#c5c8c6" dx="32">Debug docker compose ports</tspan>
      </text>
      <text y="106">
        <tspan fill="#868887">      03-24 22:40</tspan>
        <tspan fill="#868887" dx="4">12p</tspan>
        <tspan fill="#98a84b" dx="8">infra</tspan>
        <tspan fill="#c5c8c6" dx="76">Migrate to docker swarm</tspan>
      </text>
      <text y="124">
        <tspan fill="#868887">      03-24 16:05</tspan>
        <tspan fill="#868887" dx="8">5p</tspan>
        <tspan fill="#98a84b" dx="8">my-webapp</tspan>
        <tspan fill="#c5c8c6" dx="32">Docker healthcheck not working</tspan>
      </text>
      <text y="142">
        <tspan fill="#868887">      03-23 11:20</tspan>
        <tspan fill="#868887" dx="8">2p</tspan>
        <tspan fill="#d0b344" dx="8">~</tspan>
        <tspan fill="#c5c8c6" dx="112">How does docker networking</tspan>
      </text>
      <text y="160">
        <tspan fill="#868887">      03-22 09:45</tspan>
        <tspan fill="#868887" dx="8">7p</tspan>
        <tspan fill="#98a84b" dx="8">backend-api</tspan>
        <tspan fill="#c5c8c6" dx="18">Add docker support to CI</tspan>
      </text>
      <text y="178">
        <tspan fill="#868887">      03-21 17:30</tspan>
        <tspan fill="#868887" dx="8">4p</tspan>
        <tspan fill="#98a84b" dx="8">infra</tspan>
        <tspan fill="#c5c8c6" dx="76">Docker registry auth setup</tspan>
      </text>
      <text y="196">
        <tspan fill="#868887">      03-20 14:10</tspan>
        <tspan fill="#868887" dx="4">15p</tspan>
        <tspan fill="#98a84b" dx="8">my-webapp</tspan>
        <tspan fill="#c5c8c6" dx="32">Containerize the app with</tspan>
      </text>
    </g>

    <!-- Keybinding help -->
    <g transform="translate(14, 286)">
      <text y="0" fill="#868887" font-size="12">ctrl-t mode | ctrl-p project | ctrl-d date</text>
      <text y="16" fill="#868887" font-size="12">enter open | ctrl-y copy | ctrl-e export | ctrl-/ preview | tab select | esc quit</text>
      <text y="32" fill="#868887" font-size="12">shift-up/down scroll preview</text>
    </g>

    <!-- Bottom pane border -->
    <rect x="4" y="324" width="920" height="396" rx="2" fill="none" stroke="#444" stroke-width="1"/>

    <!-- Preview content -->
    <g transform="translate(14, 340)">
      <!-- Title -->
      <text y="14" fill="#c5c8c6" font-weight="bold" font-size="14"># Set up docker networking for the staging environment</text>
      <text y="34" fill="#868887">
        <tspan font-weight="bold">**Project:**</tspan>
        <tspan> my-webapp  </tspan>
        <tspan font-weight="bold">**Duration:**</tspan>
        <tspan> 45 min  </tspan>
        <tspan font-weight="bold">**Prompts:**</tspan>
        <tspan> 8</tspan>
      </text>

      <!-- Separator -->
      <line x1="0" y1="46" x2="900" y2="46" stroke="#555" stroke-width="1"/>

      <!-- Prompt 1 -->
      <text y="70" fill="#a92a59" font-weight="bold">## Prompt 1 — 14:30:12</text>
      <text y="94" fill="#c5c8c6">I need to set up <tspan font-weight="bold" fill="#d0b344">docker networking</tspan> between three containers: a postgres</text>
      <text y="112" fill="#c5c8c6">database, a redis cache, and my node.js API. They should be on the same</text>
      <text y="130" fill="#c5c8c6">network but postgres should not be reachable from outside.</text>

      <!-- Prompt 2 -->
      <text y="162" fill="#a92a59" font-weight="bold">## Prompt 2 — 14:35:48</text>
      <text y="186" fill="#c5c8c6">The compose file works but the API container can't resolve the postgres</text>
      <text y="204" fill="#c5c8c6">hostname. I'm getting ECONNREFUSED. Here's my docker-compose.yml:</text>

      <!-- Prompt 3 -->
      <text y="236" fill="#a92a59" font-weight="bold">## Prompt 3 — 14:42:15</text>
      <text y="260" fill="#c5c8c6">Now I want to add a reverse proxy with nginx. How do I configure the</text>
      <text y="278" fill="#c5c8c6"><tspan font-weight="bold" fill="#d0b344">docker network</tspan> so nginx can reach the API but not the database directly?</text>
    </g>

  </g>
  </g>
</svg>
